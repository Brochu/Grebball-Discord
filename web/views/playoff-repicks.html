<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFL Playoff Re-pick</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/playoff-repicks/style.css">
  <link rel="icon" type="image/x-icon" href="/favicon-16.ico">
</head>
<body class="bg-body">
  <div class="container py-4" style="max-width: 1100px;">

    <!-- Header -->
    <div class="d-flex align-items-center mb-4 position-relative">
      <span class="header-icon me-3"><i class="bi bi-pencil-fill"></i></span>
      <div>
        <h1 class="h4 fw-bold mb-0">Modifier la capsule <%= season %></h1>
      </div>
      <button type="button" id="theme-toggle" class="btn btn-outline-secondary position-absolute end-0" aria-label="Toggle theme">
        <i class="bi bi-moon-fill" id="theme-icon"></i>
      </button>
    </div>

    <div id="edit-view">
    <!-- Budget banner -->
    <div class="card budget-banner mb-4">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <span class="header-icon me-3"><i class="bi bi-arrow-left-right"></i></span>
          <div>
            <div class="fw-bold">Changements restants : <span id="changes-remaining" class="fw-bold text-body"><%= repicks %></span> de <%= repicks %></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pick columns -->
    <div class="row g-4">
      <div class="col-12 col-lg-6">
        <h2 class="h6 text-muted text-uppercase mb-3">AFC</h2>
        <div id="afc-picks"></div>
      </div>
      <div class="col-12 col-lg-6">
        <h2 class="h6 text-muted text-uppercase mb-3">NFC</h2>
        <div id="nfc-picks"></div>
      </div>
    </div>

    <!-- Footer / submit -->
    <form id="repick-form" method="POST" action="/capsule-repicks-submit/<%= token %>">
      <input type="hidden" name="afcWinners" id="afc-winners-input">
      <input type="hidden" name="nfcWinners" id="nfc-winners-input">
      <input type="hidden" name="afcWildcards" id="afc-wildcards-input">
      <input type="hidden" name="nfcWildcards" id="nfc-wildcards-input">
    </form>
    <div class="card footer-bar mt-4">
      <div class="card-body d-flex justify-content-end align-items-center">
        <button type="button" id="review-btn" class="btn btn-secondary" disabled onclick="goToReview()">Réviser les changements</button>
      </div>
    </div>
    </div><!-- /edit-view -->

    <!-- Review view -->
    <div id="review-view" style="display: none;">
      <div class="card budget-banner mb-4">
        <div class="card-body">
          <h2 class="h6 fw-bold mb-1">Réviser les changements</h2>
          <p class="text-muted small mb-0">Confirme tes échanges avant de les enregistrer.</p>
        </div>
      </div>

      <div id="review-summary"></div>

      <div class="card footer-bar mt-4">
        <div class="card-body d-flex justify-content-between align-items-center">
          <button type="button" class="btn btn-outline-secondary" onclick="backToEdit()">Continuer l'édition</button>
          <button type="button" class="btn btn-success" onclick="submitRepicks()">Confirmer les changements</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Swap modal -->
  <div class="modal fade" id="swap-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header align-items-start">
          <div>
            <span class="badge slot-label text-uppercase mb-2" id="swap-slot-label"></span>
            <h5 class="modal-title mb-0">Choisir un remplaçant</h5>
            <div class="text-muted small">Remplace <span id="swap-current-team" class="text-danger fw-bold"></span></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
        </div>
        <div class="modal-body p-0">
          <div class="list-group list-group-flush" id="swap-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const afcTeams = <%- JSON.stringify(afcTeams) %>;
    const nfcTeams = <%- JSON.stringify(nfcTeams) %>;
    const originalPicks = {
      afcWinners:   <%- JSON.stringify(afcWinners) %>,
      nfcWinners:   <%- JSON.stringify(nfcWinners) %>,
      afcWildcards: <%- JSON.stringify(afcWildcards) %>,
      nfcWildcards: <%- JSON.stringify(nfcWildcards) %>,
    };
    const repicksBudget = <%= repicks %>;
    window.e_prefix = "<%= e_prefix %>";
  </script>
  <script src="/js/bootstrap.bundle.min.js"></script>
  <script src="/playoff-repicks/script.js"></script>
</body>
</html>
